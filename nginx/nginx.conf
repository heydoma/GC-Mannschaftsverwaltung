# ── Nginx Reverse-Proxy (Production) ─────────────────────────────────────────
#
# Einziger öffentlicher Eingang für die gesamte App.
# Ersetze DEINE_DOMAIN.de überall mit deiner echten Domain.
#
# TLS-Zertifikat mit Let's Encrypt (certbot):
#   certbot --nginx -d DEINE_DOMAIN.de -d auth.DEINE_DOMAIN.de
#
# Danach die ssl_certificate / ssl_certificate_key Pfade anpassen.

# HTTP → HTTPS Redirect
server {
    listen 80;
    server_name DEINE_DOMAIN.de auth.DEINE_DOMAIN.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Haupt-App (Frontend + API) ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name DEINE_DOMAIN.de;

    ssl_certificate     /etc/letsencrypt/live/DEINE_DOMAIN.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DEINE_DOMAIN.de/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # API → Backend
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts für langsamere Abfragen
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Request-Größe (für Score-Uploads etc.)
        client_max_body_size 1m;
    }

    # Frontend → SPA-Container
    location / {
        proxy_pass       http://frontend:80;
        proxy_set_header Host $host;
    }
}

# ── Keycloak (eigene Subdomain) ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name auth.DEINE_DOMAIN.de;

    ssl_certificate     /etc/letsencrypt/live/DEINE_DOMAIN.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DEINE_DOMAIN.de/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location / {
        proxy_pass         http://keycloak:8080;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # Keycloak braucht größere Header für Token-Responses
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;

        client_max_body_size 10m;
    }
}
