# Nginx-Config für den Frontend-Container (SPA)
# Alle unbekannten Routen → index.html damit React Router funktioniert

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Statische Assets direkt ausliefern
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Alle anderen Routen → SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
