apiVersion: v2
name: gc-mannschaftsverwaltung
description: Golf Club Team Management – Backend, Frontend, PostgreSQL, Keycloak
type: application
version: 0.1.0
appVersion: "1.0.0"

maintainers:
  - name: Marvin Heydorn

dependencies:
  # Bitnami PostgreSQL – battle-tested, mit PVC und automatischem Secret
  - name: postgresql
    version: ">=15.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled

  # Bitnami Keycloak – production-ready, nutzt denselben PostgreSQL-Service
  - name: keycloak
    version: ">=22.0.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: keycloak.enabled
