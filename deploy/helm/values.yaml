# ── GC-Mannschaftsverwaltung – Helm Values ───────────────────────────────────
# Dokumentation aller verfügbaren Werte.
# Für Production: Werte in values.prod.yaml überschreiben (nie Secrets hier eintragen).

# ── Backend ──────────────────────────────────────────────────────────────────
backend:
  image:
    repository: ghcr.io/DEIN_GITHUB_USER/gc-backend  # Docker-Image aus deiner Registry
    tag: "latest"
    pullPolicy: IfNotPresent

  replicaCount: 2

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  workers: 2  # Uvicorn-Worker (empfohlen: 2× CPU-Cores)

  config:
    environment: "production"
    # CORS: kommagetrennte Liste erlaubter Origins
    allowedOrigins: "https://DEINE_DOMAIN.de"
    keycloakUrl: "https://auth.DEINE_DOMAIN.de"
    keycloakRealm: "golf-team-manager"
    # Tenant-Auflösung: false = nur via Host-Header (sicherer)
    allowTeamIdFallback: "false"

  # Name des Kubernetes-Secrets das DATABASE_URL + weitere Secrets enthält
  # Wird von secrets.yaml erzeugt oder extern (z.B. External Secrets) bereitgestellt
  existingSecret: ""  # leer = secrets.yaml wird verwendet

# ── Frontend ─────────────────────────────────────────────────────────────────
frontend:
  image:
    repository: ghcr.io/DEIN_GITHUB_USER/gc-frontend
    tag: "latest"
    pullPolicy: IfNotPresent

  replicaCount: 2

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: "nginx"        # nginx-ingress-controller; alternativ: "traefik"
  host: "DEINE_DOMAIN.de"
  authHost: "auth.DEINE_DOMAIN.de"   # Keycloak-Subdomain

  # Wildcard-Subdomain pro Team: herren1.DEINE_DOMAIN.de, damen.DEINE_DOMAIN.de …
  # Der Backend-Middleware löst den Tenant via Host-Header auf (resolve_tenant_by_host).
  wildcardEnabled: true

  # TLS via cert-manager
  tls: true
  # HTTP01: funktioniert für normale Domains (herren1.domain.de einzeln)
  # DNS01: nötig für Wildcard-Zertifikate (*.domain.de) – DNS-Provider konfigurieren
  certIssuer: "letsencrypt-prod"        # ClusterIssuer für normale Domains
  wildcardCertIssuer: "letsencrypt-dns" # ClusterIssuer mit DNS01-Solver für Wildcard

# ── NetworkPolicy ─────────────────────────────────────────────────────────────
# Isoliert die Datenbank: nur Backend-Pods dürfen PostgreSQL auf Port 5432 erreichen.
# Voraussetzung: CNI-Plugin mit NetworkPolicy-Support (Calico, Cilium, Weave).
networkPolicy:
  enabled: true

# ── Secrets ───────────────────────────────────────────────────────────────────
# Standard (Production): Sealed Secrets – verschlüsselt und Git-safe.
#   1. deploy/sealed-secrets/*.yaml Vorlagen ausfüllen
#   2. Mit kubeseal versiegeln → *.sealedsecret.yaml (sicher für Git)
#   3. existingSecret-Namen hier eintragen, password leer lassen
#
# Alternativ für lokale Entwicklung: password direkt setzen (values.prod.yaml).
secrets:
  # Name des vorher angelegten Sealed Secret für Keycloak-Admin (leer = aus values)
  existingKeycloakSecret: "gcm-keycloak-secret"
  keycloakAdminPassword: ""   # nur setzen wenn kein existingKeycloakSecret

# ── PostgreSQL (Bitnami Sub-Chart) ────────────────────────────────────────────
postgresql:
  enabled: true
  auth:
    username: "golf"
    database: "golf_team"
    # Sealed Secret referenzieren (empfohlen):
    existingSecret: "gcm-postgresql-secret"  # muss key 'password' enthalten
    # Alternativ für lokale Entwicklung direkt setzen:
    password: ""
  primary:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# ── Keycloak (Bitnami Sub-Chart) ──────────────────────────────────────────────
keycloak:
  enabled: true
  auth:
    adminUser: "admin"
    existingSecret: "gcm-keycloak-secret"   # Sealed Secret (empfohlen)
    passwordSecretKey: "admin-password"
    # Für lokale Entwicklung stattdessen:
    # adminPassword: "lokales-passwort"
  # Production-Modus hinter nginx-Ingress (TLS-Terminierung am Ingress)
  extraEnvVars:
    - name: KC_PROXY
      value: "edge"
    - name: KC_HOSTNAME_STRICT
      value: "false"
    - name: KC_HTTP_ENABLED
      value: "true"
  # Eigene PostgreSQL-Instanz des Sub-Charts deaktivieren,
  # stattdessen unsere PostgreSQL-Instanz verwenden
  postgresql:
    enabled: false
  externalDatabase:
    host: '{{ .Release.Name }}-postgresql'
    port: 5432
    user: "golf"
    database: "keycloak"
    existingSecret: '{{ .Release.Name }}-postgresql'
    existingSecretPasswordKey: "password"
  production: true
  proxy: edge
  persistence:
    enabled: true
    size: 1Gi
