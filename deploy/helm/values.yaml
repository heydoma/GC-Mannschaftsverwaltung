# ── GC-Mannschaftsverwaltung – Helm Values ───────────────────────────────────
# Dokumentation aller verfügbaren Werte.
# Für Production: Werte in values.prod.yaml überschreiben (nie Secrets hier eintragen).

# ── Backend ──────────────────────────────────────────────────────────────────
backend:
  image:
    repository: ghcr.io/DEIN_GITHUB_USER/gc-backend  # Docker-Image aus deiner Registry
    tag: "latest"
    pullPolicy: IfNotPresent

  replicaCount: 2

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  workers: 2  # Uvicorn-Worker (empfohlen: 2× CPU-Cores)

  config:
    environment: "production"
    # CORS: kommagetrennte Liste erlaubter Origins
    allowedOrigins: "https://DEINE_DOMAIN.de"
    keycloakUrl: "https://auth.DEINE_DOMAIN.de"
    keycloakRealm: "golf-team-manager"
    # Tenant-Auflösung: false = nur via Host-Header (sicherer)
    allowTeamIdFallback: "false"

  # Name des Kubernetes-Secrets das DATABASE_URL + weitere Secrets enthält
  # Wird von secrets.yaml erzeugt oder extern (z.B. External Secrets) bereitgestellt
  existingSecret: ""  # leer = secrets.yaml wird verwendet

# ── Frontend ─────────────────────────────────────────────────────────────────
frontend:
  image:
    repository: ghcr.io/DEIN_GITHUB_USER/gc-frontend
    tag: "latest"
    pullPolicy: IfNotPresent

  replicaCount: 2

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: "nginx"  # nginx-ingress-controller; alternativ: "traefik"
  host: "DEINE_DOMAIN.de"
  authHost: "auth.DEINE_DOMAIN.de"  # Keycloak-Subdomain

  # TLS via cert-manager (Let's Encrypt)
  tls: true
  certIssuer: "letsencrypt-prod"  # ClusterIssuer Name in deinem Cluster

# ── Secrets ───────────────────────────────────────────────────────────────────
# Option A (einfach, für den Anfang): Passwörter hier eintragen.
#   → Helm legt ein Kubernetes Secret an. values.prod.yaml ist in .gitignore.
# Option B (Production-empfohlen): Secrets extern voranlegen (Sealed Secrets /
#   External Secrets Operator) und nur den Secret-Namen hier eintragen.
#   → backend.existingSecret setzen, postgresql.auth.existingSecret setzen.
secrets:
  keycloakAdminPassword: ""   # Option A: Passwort hier; Option B: leer lassen

# ── PostgreSQL (Bitnami Sub-Chart) ────────────────────────────────────────────
postgresql:
  enabled: true
  auth:
    username: "golf"
    password: ""             # Option A: Passwort hier setzen
    database: "golf_team"
    # Option B: vorher erstelltes Secret referenzieren:
    # existingSecret: "my-postgres-secret"   # muss key 'password' enthalten
  primary:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# ── Keycloak (Bitnami Sub-Chart) ──────────────────────────────────────────────
keycloak:
  enabled: true
  auth:
    adminUser: "admin"
    adminPassword: ""    # Option A: hier setzen; Option B: existingSecret nutzen
    # existingSecret: "my-keycloak-secret"   # muss key 'admin-password' enthalten
  # Production-Modus hinter nginx-Ingress (TLS-Terminierung am Ingress)
  extraEnvVars:
    - name: KC_PROXY
      value: "edge"
    - name: KC_HOSTNAME_STRICT
      value: "false"
    - name: KC_HTTP_ENABLED
      value: "true"
  # Eigene PostgreSQL-Instanz des Sub-Charts deaktivieren,
  # stattdessen unsere PostgreSQL-Instanz verwenden
  postgresql:
    enabled: false
  externalDatabase:
    host: '{{ .Release.Name }}-postgresql'
    port: 5432
    user: "golf"
    database: "keycloak"
    existingSecret: '{{ .Release.Name }}-postgresql'
    existingSecretPasswordKey: "password"
  production: true
  proxy: edge
  persistence:
    enabled: true
    size: 1Gi
