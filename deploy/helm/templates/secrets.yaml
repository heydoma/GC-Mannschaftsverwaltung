{{- /*
  Fallback-Secret: wird nur angelegt wenn kein Sealed Secret verwendet wird
  (secrets.keycloakAdminPassword direkt in values gesetzt).

  Empfohlen für Production: Sealed Secrets nutzen.
    deploy/sealed-secrets/*.yaml → kubeseal → *.sealedsecret.yaml (Git-safe)
    https://github.com/bitnami-labs/sealed-secrets
*/ -}}
{{- if and .Values.secrets.keycloakAdminPassword (not .Values.secrets.existingKeycloakSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gcm.fullname" . }}-keycloak-secret
  labels:
    {{- include "gcm.labels" . | nindent 4 }}
type: Opaque
stringData:
  admin-password: {{ .Values.secrets.keycloakAdminPassword | quote }}
{{- end }}
