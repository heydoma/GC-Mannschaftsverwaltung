{{- /*
  App-eigenes Secret für Werte die nicht von den Bitnami Sub-Charts verwaltet werden.

  WICHTIG: Helm speichert alle Values (inkl. Secrets) als base64 im Cluster.
  Für Production empfohlen:
    - Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
    - External Secrets Operator (https://external-secrets.io)
    - Dann dieses Template deaktivieren und existingSecret in values setzen.
*/ -}}
{{- if not .Values.backend.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gcm.fullname" . }}-secrets
  labels:
    {{- include "gcm.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.keycloakAdminPassword }}
  KEYCLOAK_ADMIN_PASSWORD: {{ .Values.secrets.keycloakAdminPassword | quote }}
  {{- end }}
{{- end }}
