{{- if .Values.networkPolicy.enabled }}
{{- $fullname := include "gcm.fullname" . }}

# ── PostgreSQL: nur Backend-Pods dürfen rein ──────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-postgres-isolation
  labels:
    {{- include "gcm.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
  ingress:
    # Nur Backend-Pods auf Port 5432
    - from:
        - podSelector:
            matchLabels:
              {{- include "gcm.backendSelectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 5432
---
# ── Backend: erlaubte ein- und ausgehende Verbindungen ───────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-backend-policy
  labels:
    {{- include "gcm.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "gcm.backendSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Nur vom Ingress-Controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
  egress:
    # → PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 5432
    # → Keycloak (JWT-Validierung)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - protocol: TCP
          port: 8080
    # → DNS (nötig damit Python-Code Hostnamen auflösen kann)
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# ── Frontend: nur vom Ingress erreichbar ─────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ $fullname }}-frontend-policy
  labels:
    {{- include "gcm.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "gcm.frontendSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 80
{{- end }}
