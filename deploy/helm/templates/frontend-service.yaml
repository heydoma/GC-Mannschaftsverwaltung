apiVersion: v1
kind: Service
metadata:
  name: {{ include "gcm.fullname" . }}-frontend
  labels:
    {{- include "gcm.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    {{- include "gcm.frontendSelectorLabels" . | nindent 4 }}
