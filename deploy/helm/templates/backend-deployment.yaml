apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gcm.fullname" . }}-backend
  labels:
    {{- include "gcm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "gcm.backendSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gcm.backendSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "gcm.fullname" . }}-backend-config
          env:
            # DATABASE_URL aus Secret + Bitnami PostgreSQL Password
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gcm.postgresHost" . }}
                  key: password
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.auth.username }}:$(POSTGRES_PASSWORD)@{{ include "gcm.postgresHost" . }}:5432/{{ .Values.postgresql.auth.database }}"
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
