name: Release

on:
  # Automatisch: Images bauen + pushen bei jedem Merge auf main
  push:
    branches: [main]

  # Manuell: Images bauen + pushen + auf Cluster deployen
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image-Tag der deployed werden soll (leer = aktueller Commit)"
        required: false
        default: ""
      confirm_deploy:
        description: "Wirklich auf den Cluster deployen? (ja)"
        required: true
        default: "nein"

# Benötigte GitHub Secrets (Settings → Secrets → Actions):
#   KUBE_CONFIG          base64-kodiertes kubeconfig (kubectl config view --raw | base64)
#   HELM_VALUES_PROD     Inhalt von deploy/helm/values.prod.yaml
#   VITE_KEYCLOAK_URL    z.B. https://auth.meinclub.de

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/gc-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/gc-frontend

jobs:
  # ── Backend-Image bauen und pushen ─────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Image-Tag bestimmen
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Login zu ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Backend bauen und pushen
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Frontend-Image bauen und pushen ────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Image-Tag bestimmen
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Login zu ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Frontend bauen und pushen
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:latest
          build-args: |
            VITE_API_URL=/api
            VITE_KEYCLOAK_URL=${{ secrets.VITE_KEYCLOAK_URL }}
            VITE_KEYCLOAK_REALM=golf-team-manager
            VITE_KEYCLOAK_CLIENT_ID=golf-frontend
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Manueller Deploy auf den Cluster ───────────────────────────────────────
  deploy:
    if: github.event_name == 'workflow_dispatch' && inputs.confirm_deploy == 'ja'
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    environment: production   # optional: GitHub Environment mit Approval-Schutz
    steps:
      - uses: actions/checkout@v4

      - name: Image-Tag bestimmen
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: kubectl einrichten
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm installieren
        uses: azure/setup-helm@v4

      - name: Helm Dependencies laden
        run: helm dependency update deploy/helm

      - name: values.prod.yaml schreiben
        run: echo "${{ secrets.HELM_VALUES_PROD }}" > /tmp/values.prod.yaml

      - name: Auf Cluster deployen
        run: |
          helm upgrade --install gcm deploy/helm \
            --namespace golf \
            --create-namespace \
            -f deploy/helm/values.yaml \
            -f /tmp/values.prod.yaml \
            --set backend.image.tag=${{ steps.tag.outputs.tag }} \
            --set frontend.image.tag=${{ steps.tag.outputs.tag }} \
            --wait \
            --timeout 5m

      - name: Rollout-Status prüfen
        run: |
          kubectl rollout status deployment/gcm-gc-mannschaftsverwaltung-backend -n golf
          kubectl rollout status deployment/gcm-gc-mannschaftsverwaltung-frontend -n golf
