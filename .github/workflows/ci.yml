name: CI

on:
  push:
  pull_request:

jobs:
  # ── Backend: Tests ──────────────────────────────────────────────────────────
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: golf
          POSTGRES_PASSWORD: golf
          POSTGRES_DB: golf_team
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U golf -d golf_team"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Apply schema
        run: psql -h localhost -U golf -d golf_team -f db/init.sql
        env:
          PGPASSWORD: golf

      - name: Apply all migrations (alphabetisch)
        run: |
          for f in $(ls db/migrations/*.sql 2>/dev/null | sort); do
            echo "→ $f"
            psql -h localhost -U golf -d golf_team -f "$f"
          done
        env:
          PGPASSWORD: golf

      - name: Run tests
        run: pytest backend/tests -v
        env:
          DATABASE_URL: postgresql://golf:golf@localhost:5432/golf_team
          ENVIRONMENT: development

  # ── Frontend: Build-Check ───────────────────────────────────────────────────
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # npm install statt npm ci: Lock File enthält keine Linux-spezifischen
        # optionalen Pakete (@emnapi) da es auf macOS generiert wurde.
        run: npm install
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: /api
          # Platzhalter – nur für den Build-Check, wird nie deployed.
          # Der echte Wert kommt in release.yml aus secrets.VITE_KEYCLOAK_URL.
          VITE_KEYCLOAK_URL: https://auth.example.com
          VITE_KEYCLOAK_REALM: golf-team-manager
          VITE_KEYCLOAK_CLIENT_ID: golf-frontend
